<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexcent</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <img src="./Nexcent.png" alt="nexcent-logo" class="header-image">

    </header>
    <br>
